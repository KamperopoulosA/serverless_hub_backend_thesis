spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/serverless_platform_dev_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    
logging:
  level:
    com.serverless.platformselector: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG