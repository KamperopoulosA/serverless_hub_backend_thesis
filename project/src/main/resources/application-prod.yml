spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    
logging:
  level:
    com.serverless.platformselector: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    
app:
  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY}